<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kite Paper Trading</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col justify-between h-screen text-gray-600">

    <div></div>

    <div class="w-full max-w-[380px] mx-auto p-8 bg-white border border-gray-200 shadow-md rounded border-t-4 border-orange-500">
        
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black tracking-tight text-gray-800">
                KITE <span class="text-xs bg-orange-100 text-orange-600 px-2 py-0.5 rounded font-bold uppercase">Paper</span>
            </h1>
        </div>

        <form action="/save_token" method="POST" class="space-y-5">
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Upstox Access Token
                </label>
                
                <input 
                    type="text" 
                    name="token" 
                    placeholder="Paste your token here..." 
                    required 
                    class="w-full px-3 py-2.5 border border-gray-300 rounded text-sm font-mono focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition shadow-inner placeholder-gray-400 text-gray-800"
                >
            </div>

            <div>
                <button 
                    type="submit" 
                    class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2.5 px-4 rounded text-sm transition uppercase tracking-wider shadow-sm cursor-pointer"
                >
                    Login
                </button>
            </div>

            <div class="text-center pt-2">
                <a href="https://developer.upstox.com/" target="_blank" class="text-xs text-blue-500 hover:underline">
                    Get Upstox Token
                </a>
            </div>
        </form>
    </div>

    <div class="text-center py-4 border-t border-gray-100 bg-white w-full">
        <p class="text-[11px] text-gray-400">Zerodha Kite Clone Terminal • Powered by Upstox API</p>
    </div>

</body>
</html>
