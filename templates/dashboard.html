<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kite Paper Trading - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center h-screen">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-lg border border-gray-700 text-center max-w-sm w-full">
        <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
            <span class="text-xs bg-green-500/20 text-green-400 px-2 py-0.5 rounded-full font-bold animate-pulse">● Live</span>
            <span class="text-xs text-gray-400 font-mono">Upstox API</span>
        </div>
        
        <h1 class="text-xl font-semibold text-gray-400 uppercase tracking-wider mb-2">Market Watch</h1>
        
        <div class="my-6">
            <p class="text-2xl font-bold text-orange-500">{{ stock }}</p>
            <p class="text-4xl font-extrabold mt-2 text-green-400">
                {% if price is number %} ₹{{ price }} {% else %} {{ price }} {% endif %}
            </p>
        </div>

        <div class="flex gap-4">
            <button onclick="window.location.reload()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-medium py-2 rounded-lg transition text-sm">
                Refresh
            </button>
            <a href="/logout" class="bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white font-medium py-2 px-4 rounded-lg transition text-sm">
                Logout
            </button>
        </div>
    </div>

</body>
</html>
